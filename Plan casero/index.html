<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Presentación - Plan Casero</title>
  <style>
    :root {
      --bg: #0f1220;
      --fg: #eef1ff;
      --muted: #a9b0c8;
      --accent: #f7c948;
      --shadow: rgba(0,0,0,.45);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", system-ui, sans-serif;
      color: var(--fg);
      background: radial-gradient(1200px 600px at 10% 10%, #1c2240, #0f1220);
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .deck {
      width: min(1200px, 92vw);
      height: min(720px, 92vh);
      background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      box-shadow: 0 30px 80px var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .slide {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      transition: opacity 500ms ease;
      background: #0b0d18;
    }
    .slide.active { opacity: 1; }
    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #0b0d18;
    }
    .hud {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      display: grid;
      grid-template-columns: 1fr auto auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.55));
      font-size: 14px;
    }
    .hud .title { color: var(--muted); }
    .hud .counter { font-variant-numeric: tabular-nums; }
    .btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: var(--fg);
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn:hover { border-color: rgba(255,255,255,0.3); }
    .hint {
      position: absolute;
      top: 14px; right: 16px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(0,0,0,0.35);
      padding: 6px 10px;
      border-radius: 999px;
    }
    @media (max-width: 720px) {
      body { place-items: stretch; }
      .deck {
        width: 100vw;
        height: 100dvh;
        border-radius: 0;
        border: 0;
      }
      .hud {
        grid-template-columns: 1fr auto auto;
        padding: 12px 14px 16px;
      }
      .hud .title { display: none; }
      .btn {
        padding: 10px 14px;
        border-radius: 10px;
      }
      .hint { top: 10px; right: 10px; font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="deck" id="deck">
    <div class="hint">Teclas: ← →  ·  Espacio: play/pausa</div>
    <div class="slide active"><img src="1.jpg" alt="Slide 1"></div>
    <div class="slide"><img src="2.jpg" alt="Slide 2"></div>
    <div class="slide"><img src="3.jpg" alt="Slide 3"></div>
    <div class="slide"><img src="4.jpg" alt="Slide 4"></div>
    <div class="slide"><img src="5.jpg" alt="Slide 5"></div>
    <div class="slide"><img src="6.jpg" alt="Slide 6"></div>
    <div class="slide"><img src="7.jpg" alt="Slide 7"></div>
    <div class="slide"><img src="8.jpg" alt="Slide 8"></div>
    <div class="slide"><img src="9.jpg" alt="Slide 9"></div>
    <div class="slide"><img src="10.jpg" alt="Slide 10"></div>
    <div class="slide"><img src="11.jpg" alt="Slide 11"></div>
    <div class="slide"><img src="12.jpg" alt="Slide 12"></div>
    <div class="slide"><img src="13.jpg" alt="Slide 13"></div>
    <div class="slide"><img src="14.jpg" alt="Slide 14"></div>
    <div class="slide"><img src="15.jpg" alt="Slide 15"></div>
    <div class="slide"><img src="16.jpg" alt="Slide 16"></div>
    <div class="slide"><img src="17.jpg" alt="Slide 17"></div>
    <div class="slide"><img src="18.jpg" alt="Slide 18"></div>

    <div class="hud">
      <div class="title">Plan Casero</div>
      <button class="btn" id="prev">Anterior</button>
      <button class="btn" id="next">Siguiente</button>
      <div class="counter" id="counter">1 / 18</div>
    </div>
  </div>

  <script>
    const slides = Array.from(document.querySelectorAll('.slide'));
    const counter = document.getElementById('counter');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    let index = 0;
    let playing = false;
    let timer = null;

    function show(i) {
      slides[index].classList.remove('active');
      index = (i + slides.length) % slides.length;
      slides[index].classList.add('active');
      counter.textContent = `${index + 1} / ${slides.length}`;
    }

    function next() { show(index + 1); }
    function prev() { show(index - 1); }

    function togglePlay() {
      playing = !playing;
      if (playing) {
        timer = setInterval(next, 3500);
      } else {
        clearInterval(timer);
      }
    }

    nextBtn.addEventListener('click', next);
    prevBtn.addEventListener('click', prev);

    let startX = 0;
    let startY = 0;

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') next();
      if (e.key === 'ArrowLeft') prev();
      if (e.key === ' ') { e.preventDefault(); togglePlay(); }
    });

    // Simple swipe support for mobile
    const deck = document.getElementById('deck');
    deck.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      startX = t.clientX;
      startY = t.clientY;
    }, { passive: true });

    deck.addEventListener('touchend', (e) => {
      const t = e.changedTouches[0];
      const dx = t.clientX - startX;
      const dy = t.clientY - startY;
      if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) {
        if (dx < 0) next(); else prev();
      }
    }, { passive: true });
  </script>
</body>
</html>
